<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my zoo</title>
    <style>
        body {

            font-family: Arial, sans-serif;

            background: rgb(11, 107, 185);

            text-align: center;

            padding: 30px;

        }

        h1 {

            color: #c6ed03;

        }

        #zoo {

            border: 2px solid #5643ff;

            width: 300px;

            margin: 16px auto;

            padding: 12px;

            border-radius: 10px;

            background: white;

        }

        .zone {

            border: 1px solid #4385ff;

            margin: 6px 0;

            padding: 8px 12px;

            border-radius: 6px;

            text-align: left;

        }

        button {

            background: #f0ff1d;

            color: rgb(1, 0, 0);

            padding: 10px 24px;

            border: none;

            border-radius: 20px;

            cursor: pointer;

        }
    </style>
</head>

<body>
    <h1>My Zoo</h1>
    <p>Use JavaScript and the DOM to add animals to each cage!</p>
    <div id="zoo">
        <div class="zone">
            Zone 1:
            <span id="zone1"></span>
        </div>
        <div class="zone">
            Zone 2:
            <span id="zone2"></span>
        </div>
        <div class="zone">
            Zone 3:
            <span id="zone3"></span>

        </div>
        <div class="zone">
            Total Animals:
            <span id="total"></span>
        </div>
    </div>
    <button onclick="zoo()">
        Open The Zooo
    </button>
    <p id="status"></p>

    <script>
        function zoo(){
            document.getElementById("zone1").innerHTML="Lion";
            document.getElementById("zone2").innerHTML = "Penguin";
            document.getElementById("zone3").innerHTML = "Zebra";
            document.getElementById("total").innerHTML = "3";
            document.getElementById("zoo").style.backgroundColor="pink";
            document.getElementById("status").innerHTML=document.title + " is Open Now"
        } 
        
    </script>

</body>

</html>
